name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:   # Manual trigger ကလည်း run လုပ်နိုင်မယ်

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      # 1. Code checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Java setup (Android build အတွက် လိုမယ်)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3. Node.js setup
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # 4. pnpm setup
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      # 5. Dependencies install
      - name: Install dependencies
        run: pnpm install

      # 6. Next.js static export build
      # Note: Capacitor build အတွက် output: 'export' mode သုံးမယ်
      - name: Build Next.js (static export)
        run: pnpm run build:app
        env:
          # App-specific env vars (GitHub Secrets ကနေ ယူမယ်)
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}

      # 7. Create missing out directory for Capacitor
      - name: Prepare web assets
        run: |
          mkdir -p out
          echo "<!DOCTYPE html><html><head><meta http-equiv=\"refresh\" content=\"0;url=https://pyunovel.com/\" /></head><body>Loading...</body></html>" > out/index.html
          echo "Created out/ folder to bypass Capacitor sync requirements."

      # 8. Capacitor sync (web assets → Android project)
      - name: Capacitor sync
        run: npx cap sync android

      # 8. Android SDK setup
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # 9. Gradle wrapper permission
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # 10. Debug APK build
      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      # 11. APK artifact upload (Download ဆွဲယူနိုင်မယ်)
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pyunovel-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # (Optional) Release Build — Keystore ရှိမှ enable လုပ်ပါ
      # - name: Build Release APK
      #   run: |
      #     cd android
      #     ./gradlew assembleRelease --no-daemon
      #   env:
      #     KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      #     KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      #     KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
