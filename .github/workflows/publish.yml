name: Cron Publish Scheduled Posts

on:
  schedule:
    # Trigger every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Cron Publish API
        run: |
          curl -X GET "https://pyunovel.com/api/cron/publish" \
          -H "x-admin-secret: ${{ secrets.ADMIN_SECRET_KEY }}" \
          --fail
